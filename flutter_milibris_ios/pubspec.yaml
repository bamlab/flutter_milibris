name: flutter_milibris_ios
description: iOS implementation of the flutter_milibris plugin
version: 0.1.0+1

environment:
  sdk: ^3.11.0

flutter:
  plugin:
    implements: flutter_milibris
    platforms:
      ios:
        pluginClass: FlutterMilibrisPlugin
        dartPluginClass: FlutterMilibrisIOS

dependencies:
  ffi: ^2.1.3
  flutter:
    sdk: flutter
  flutter_milibris_platform_interface: 0.1.0
  objective_c: ^9.3.0

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.2.0
